<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>ManO CreationS</title>
<link href="https://fonts.googleapis.com/cs2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@property --angle { syntax:'<angle>'; initial-value:0deg; inherits:false; }
@keyframes bgPulse { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
@keyframes flowFade {
  0%   { --angle:0deg; opacity:0; }
  10%  { --angle:100deg; opacity:0.5; }
  30%  { --angle:190deg; opacity:1; }
  50%  { --angle:280deg; opacity:1; }
  60%  { --angle:350deg; opacity:0.5; }
  100% { --angle:540deg; opacity:0; }
}
@keyframes flowLoop {
  0%   { --angle:0deg; }
  100% { --angle:360deg; }
}
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body {
  font-family: 'DM Sans', system-ui, sans-serif; color: #fff; background: #000000;
  overflow-x: hidden;
  overscroll-behavior-y: none;
}

button, a, [role="button"] { touch-action: manipulation; }

.hero {
  /* Fallback for older browsers, then progressively enhance with a JS-measured
     viewport unit (--app-vh) and finally the modern dvh unit, so mobile browser
     UI chrome (address bar) and the on-screen keyboard don't break the layout. */
  min-height: 100vh;
  min-height: calc(var(--app-vh, 1vh) * 100);
  min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 56px 20px;
  padding-top: calc(56px + env(safe-area-inset-top));
  padding-bottom: calc(56px + env(safe-area-inset-bottom));
  padding-left: calc(20px + env(safe-area-inset-left));
  padding-right: calc(20px + env(safe-area-inset-right));
  background: #000000;
  font-family: 'DM Sans', system-ui, sans-serif;
  transition: align-items .2s ease;
}
.hero.keyboard-open {
  align-items: flex-start;
}
.wrapper {
  position: relative;
  width: 100%; max-width: 550px;
  margin: 0 auto;
}
.nebula {
  position: absolute;
  left: 0; right: 0;
  top: 50%; translate: 0 -50%;
  height: 62px; border-radius: 100px;
  background: conic-gradient(from var(--angle), #4285f4, #b100cd, #ff3d00, #ffd000, #4285f4);
  filter: blur(18px); opacity: .6; z-index: 1; pointer-events: none;
  animation: flowFade 3s ease-out forwards;
}
.nebula.active {
  animation: flowLoop 3s linear infinite;
  opacity: 0.6;
}
.search-bar-container {
  position: relative;
  width: 100%;
  height: 62px;
}
.search-bar {
  position: relative; height: 62px; border-radius: 100px;
  background: #121212;
  display: flex; align-items: center;
  padding: 0 16px 0 22px;
  z-index: 2; gap: 10px;
  cursor: text;
}
.search-bar::before {
  content: "";
  position: absolute; inset: -1.5px; border-radius: 100px; padding: 1.5px;
  background: conic-gradient(from var(--angle), #4285f4 0%, #b100cd 25%, #ff3d00 50%, #ffd000 75%, #4285f4 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out; mask-composite: exclude;
  animation: none;
  opacity: 0;
}
.search-bar.flash-border::before {
  animation: flowFade 3s ease-out forwards;
}
.search-bar.searching::before {
  animation: flowLoop 3s linear infinite;
  opacity: 1;
}
.plus-btn {
  flex-shrink: 0;
  width: 34px; height: 34px;
  border-radius: 50%; border: none;
  background: rgba(255,255,255,.1);
  display: flex; align-items: center; justify-content: center;
  animation: fadeUp .4s ease .3s both;
  pointer-events: all;
  cursor: pointer;
  transition: background .2s, transform .15s;
  position: relative;
}
.plus-btn:hover { background: rgba(138,180,248,.18); }
.plus-btn:active { transform: scale(.88); }
.plus-btn.has-file { background: rgba(0,205,147,.15); }
.plus-btn svg {
  width: 18px; height: 18px;
  fill: none; stroke: #fff;
  stroke-width: 2.2; stroke-linecap: round;
  transition: opacity .15s;
}
.plus-btn::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%; transform: translateX(-50%);
  background: rgba(20,20,20,.92);
  color: #fff;
  font-size: 11px;
  letter-spacing: .3px;
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 6px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .18s;
  font-family: 'DM Sans', system-ui, sans-serif;
}
.plus-btn:hover::after { opacity: 1; }

.file-badge {
  display: none;
  align-items: center; gap: 6px;
  margin-top: 8px;
  padding: 5px 12px;
  background: rgba(0,205,147,.1);
  border: 1px solid rgba(0,205,147,.3);
  border-radius: 100px;
  font-size: 11px; color: #80ffe1;
  font-family: 'DM Sans', system-ui, sans-serif;
  letter-spacing: .3px;
  animation: fadeUp .25s ease both;
  max-width: 100%;
  overflow: hidden;
}
.file-badge.visible { display: inline-flex; }
.file-badge-name {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 320px;
}
.file-badge-remove {
  flex-shrink: 0;
  cursor: pointer;
  opacity: .6;
  transition: opacity .15s;
  background: none; border: none; color: #80ffe1;
  font-size: 14px; line-height: 1; padding: 0 2px;
}
.file-badge-remove:hover { opacity: 1; }

.input-row {
  flex: 1;
  display: flex; align-items: stretch;
  overflow: hidden;
  min-width: 0;
}
.typed-text {
  font-size: clamp(1rem, 4vw, 1.35rem);
  font-weight: 400;
  color: #fff;
  font-family: 'DM Sans', system-ui, sans-serif;
  white-space: nowrap;
  overflow: hidden;
  width: 100%;
  height: 100%;
  text-align: left;
  background: transparent;
  border: none;
  outline: none;
  caret-color: #8ab4f8;
  padding: 0;
  user-select: text;
  -webkit-user-select: text;
  cursor: text;
}
.typed-text::placeholder { color: rgba(255,255,255,.45); font-weight: 400; }

.send-btn {
  flex-shrink: 0;
  width: 40px; height: 40px;
  border-radius: 50%; border: none;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .2s;
  z-index: 3;
}
.send-btn:hover { background: rgba(255,255,255,.1); }
.send-btn svg {
  width: 20px; height: 20px;
  fill: none; stroke: #8ab4f8;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}
.send-btn.loading svg {
  animation: spin 1s linear infinite;
}

.mic-btn {
  flex-shrink: 0;
  width: 40px; height: 40px;
  border-radius: 50%; border: none;
  background: rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .2s, transform .15s;
  position: relative;
  z-index: 3;
}
.mic-btn:hover { background: rgba(138,180,248,.18); }
.mic-btn:active { transform: scale(.9); }
.mic-btn svg {
  width: 18px; height: 18px;
  fill: none; stroke: #fff;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  transition: stroke .2s;
}
.mic-btn.listening {
  background: rgba(255,61,0,.18);
  animation: micPulse 1.4s ease-in-out infinite;
}
.mic-btn.listening svg { stroke: #ff6a4d; }
.mic-btn.unsupported { display: none; }
@keyframes micPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,61,0,.35); }
  50% { box-shadow: 0 0 0 9px rgba(255,61,0,0); }
}
.mic-btn::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%; transform: translateX(-50%);
  background: rgba(20,20,20,.92);
  color: #fff;
  font-size: 11px;
  letter-spacing: .3px;
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 6px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .18s;
  font-family: 'DM Sans', system-ui, sans-serif;
}
.mic-btn:hover::after { opacity: 1; }

.ai-badge {
  display: none;
  margin-bottom: 22px;
  padding: 0;
  border: none;
  background: transparent;
  color: #ffffff;
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.8rem, 5vw, 3.4rem);
  line-height: 1.15;
  letter-spacing: 0;
  text-align: center;
  justify-content: center;
  animation: fadeUp .45s ease both;
  transition: opacity .3s ease, transform .3s ease;
}
.ai-badge.hidden {
    opacity: 0;
    transform: translateY(-10px);
    pointer-events: none;
}

.ai-badge-logo {
  display: none;
}

.ai-response-panel {
  display: none;
  max-width: 550px;
  margin: 0 auto 18px;
  text-align: left;
}
.ai-response-panel.visible { display: block; }

@media (min-width: 760px) {
  .ai-response-panel.visible {
    position: relative;
    left: 50%;
    transform: translateX(-50%);
    width: 780px;
    max-width: 88vw;
  }
}

.ai-response-inner {
  display: flex;
  flex-direction: column;
  gap: 22px;
  max-height: 60vh;
  overflow-y: auto;
  padding: 4px 4px 4px 0;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.ai-response-inner::-webkit-scrollbar { display: none; }

.chat-turn {
  display: flex;
  flex-direction: column;
  gap: 16px;
  animation: fadeUp .35s ease both;
}

.chat-user-row { display: flex; justify-content: flex-end; align-items: flex-start; gap: 10px; }
.chat-user-avatar {
  flex-shrink: 0;
  width: 34px; height: 34px;
  border-radius: 50%;
  overflow: hidden;
  margin-top: 2px;
  background: rgba(255,255,255,.1);
}
.chat-user-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: block;
}
.chat-user-bubble {
  max-width: 82%;
  background: rgba(255,255,255,.09);
  border: 1px solid rgba(255,255,255,.08);
  color: rgba(255,255,255,.92);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: .93rem;
  line-height: 1.6;
  padding: 10px 16px;
  border-radius: 18px 18px 4px 18px;
  white-space: pre-wrap;
  word-break: break-word;
}
.chat-user-file {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  padding: 4px 10px;
  font-size: 11px;
  color: #80ffe1;
  background: rgba(0,205,147,.1);
  border: 1px solid rgba(0,205,147,.3);
  border-radius: 100px;
}

.chat-assistant-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.chat-avatar {
  flex-shrink: 0;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  margin-top: 2px;
  position: relative;
}
.chat-avatar img {
  width: 53px;
  height: 53px;
  object-fit: contain;
  border-radius: 8px;
  cursor: pointer;
}

.chat-assistant-body { flex: 1; min-width: 0; }
.ai-response-label-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}
.ai-response-label {
  font-size: 11px;
  color: #80ffe1;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin: 0;
  font-family: 'DM Sans', system-ui, sans-serif;
}
.speak-btn {
  flex-shrink: 0;
  width: 24px; height: 24px;
  border-radius: 50%; border: none;
  background: rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.speak-btn:hover { background: rgba(138,180,248,.18); }
.speak-btn:active { transform: scale(.9); }
.speak-btn svg {
  width: 13px; height: 13px;
  fill: none; stroke: rgba(255,255,255,.6);
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
.speak-btn.speaking { background: rgba(138,180,248,.22); }
.speak-btn.speaking svg { stroke: #8ab4f8; }
.ai-response-text {
  font-size: .95rem;
  line-height: 1.75;
  color: rgba(255,255,255,.85);
  font-family: 'DM Sans', system-ui, sans-serif;
  white-space: pre-wrap;
}
.ai-response-text.typing::after {
  content: '▋';
  display: inline-block;
  animation: blink .7s step-end infinite;
  color: #8ab4f8;
  margin-left: 2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.disclaimer-text {
  margin-top: 14px;
  font-size: 11.5px;
  color: rgba(255,255,255,.35);
  letter-spacing: .2px;
  font-family: 'DM Sans', system-ui, sans-serif;
  animation: fadeUp .4s ease .3s both;
}

.chat-branding {
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,.08);
  font-family: 'DM Sans', system-ui, sans-serif;
  position: sticky;
  bottom: 0;
  background: transparent;
  z-index: 4;
}
.chat-branding.visible { display: flex; }

.chat-branding-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.chat-branding-logo {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
  cursor: pointer;
}
.chat-branding-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.chat-branding-text {
  font-size: 11px;
  color: rgba(255,255,255,.4);
  letter-spacing: .3px;
}
.chat-branding-text b { color: rgba(255,255,255,.6); font-weight: 500; }

.new-chat-btn {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.06);
  color: rgba(255,255,255,.75);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 11px;
  letter-spacing: .3px;
  cursor: pointer;
  transition: background .2s, color .2s, transform .15s;
}
.new-chat-btn:hover { background: rgba(138,180,248,.16); color: #fff; }
.new-chat-btn:active { transform: scale(.94); }
.new-chat-btn svg {
  width: 13px; height: 13px;
  fill: none; stroke: currentColor;
  stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
}

.chat-branding-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.voice-toggle-btn {
  flex-shrink: 0;
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.voice-toggle-btn:hover { background: rgba(138,180,248,.16); }
.voice-toggle-btn:active { transform: scale(.92); }
.voice-toggle-btn svg {
  width: 14px; height: 14px;
  fill: none; stroke: rgba(255,255,255,.75);
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
.voice-toggle-btn.enabled { background: rgba(0,205,147,.15); border-color: rgba(0,205,147,.3); }
.voice-toggle-btn.enabled svg { stroke: #80ffe1; }
.ai-response-text a {
  color:#ffd54f;
  text-decoration:underline;
  font-weight:500;
  word-break:break-word;
}
.ai-response-text a:hover{opacity:.85;}


@media (max-width: 759px) {
  /* Cap the hero to exactly the visible viewport and let the chat thread
     be the only thing that scrolls internally (flex:1 below), instead of
     letting the whole page grow taller than the screen. That's what was
     letting the fixed input dock end up overlapping/clipping the tail of
     the latest AI message: the page couldn't scroll far enough to bring
     it fully above the dock, since the dock is fixed to the viewport, not
     to the page's content. */
  .hero {
    height: 100vh;
    height: calc(var(--app-vh, 1vh) * 100);
    height: 100dvh;
    min-height: 0;
    overflow: hidden;
    padding: 16px 20px 20px;
    padding-top: calc(16px + env(safe-area-inset-top));
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    align-items: stretch;
  }
  .hero-content {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    width: 100%;
    min-height: 0;
  }
  .wrapper {
    display: flex;
    flex-direction: column;
    flex: 0 1 auto;
    min-height: 0;
  }
  .ai-response-panel.visible {
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 0 1 auto;
  }
  .ai-response-inner {
    flex: 0 1 auto;
    min-height: 0;
    max-height: none;
  }
  .chat-avatar { display: none; }
  .chat-user-avatar { width: 26px; height: 26px; }
  .chat-user-bubble { font-size: .79rem; }
  .ai-response-text { font-size: .81rem; }
  .ai-response-label { font-size: 9.5px; }
  .chat-user-file { font-size: 9.5px; }
  .ai-badge { margin-bottom: 14px; flex: 0 0 auto; }
  .ai-response-panel { margin: 0 auto 0; }
  .file-badge { margin-top: 6px; }
  .disclaimer-text { font-size: 9.75px; margin-top: 8px; }
  .chat-branding-text { font-size: 9.5px; }
  .new-chat-btn { font-size: 10px; padding: 6px 11px; min-height: 32px; }
  .chat-branding { flex: 0 0 auto; }

  /* Larger, easier-to-tap targets on touch screens */
  .plus-btn { width: 40px; height: 40px; }
  .mic-btn { width: 42px; height: 42px; }
  .send-btn { width: 44px; height: 44px; }
  .file-badge-remove { padding: 6px; font-size: 13px; }
  .typed-text { font-size: 16px; } /* prevents iOS Safari auto-zoom on focus */

  /* Keep the tooltip from covering content awkwardly on touch (no hover state) */
  .plus-btn::after { display: none; }
  .mic-btn::after { display: none; }

  .chat-branding {
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ===== Mobile input dock: pin the search bar to the bottom of the
     visible viewport, right above the on-screen keyboard, so it's always
     the closest thing to the user's thumbs/keyboard — no scrolling to
     reach it, no losing it behind the chat thread. */
  .input-dock {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 40;
    padding: 10px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, #000 65%, rgba(0,0,0,0));
  }
  .input-dock .wrapper-inner {
    max-width: 550px;
    margin: 0 auto;
  }
  /* Content is bottom-aligned now, so reserve exactly the fixed input
     dock's real height here (measured in JS via --dock-h) — instead of on
     .ai-response-inner or the panel — so content sits flush above the
     search bar with no extra gap. */
  .hero {
    padding-bottom: var(--dock-h, calc(140px + env(safe-area-inset-bottom)));
  }

  /* Keep the flex-fill chain active in both keyboard states — this is
     what guarantees the chat thread always sizes to exactly the
     remaining space above the dock, so nothing gets clipped underneath
     it, whether the keyboard is open or not. */
  .hero.keyboard-open {
    align-items: stretch;
  }
}

@media (max-width: 420px) {
  .chat-user-bubble { max-width: 90%; }
}

/* Desktop only: the mobile flex-column chain above replaces vh-based
   max-heights, since those were what let the fixed dock clip the last
   line(s) of the newest message whenever the page couldn't scroll the
   rest of the way into view. */
@media (min-width: 760px) {
  body.keyboard-open .ai-response-inner {
    max-height: 38vh;
  }
}
</style>
<script>if ('scrollRestoration' in history) history.scrollRestoration = 'manual';</script>
</head>
<body>

<!-- Sign-in overlay — shown first, hidden once signed in with Google -->
<div id="nameOverlay" style="
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100; padding:20px;
  padding-top:calc(20px + env(safe-area-inset-top));
  padding-bottom:calc(20px + env(safe-area-inset-bottom));
  font-family:'DM Sans',system-ui,sans-serif;
">
  <div style="text-align:center; margin-bottom:32px;">
    <div style="font-size:clamp(1.6rem,5vw,2.6rem); color:#fff; font-weight:500; margin-bottom:8px;">ManO CreationS</div>
    <div style="font-size:.95rem; color:rgba(255,255,255,.45);">Every Pixel Has a Purpose</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:16px;">
    <div id="googleSignInBtn"></div>
    <div id="googleSignInFallback" style="display:none; max-width:300px; text-align:center; color:rgba(255,255,255,.5); font-size:.85rem; line-height:1.5;">
      Couldn't load Google Sign-In. Check your connection and refresh the page.
    </div>
  </div>
</div>

<section class="hero">

// ===== MOBILE VIEWPORT & KEYBOARD HANDLING =====
// Detect touch/coarse-pointer devices so desktop-only behaviors (like the
// "start typing anywhere focuses the input" listener) don't interfere with
// mobile virtual keyboards.
const isCoarsePointer = window.matchMedia('(pointer: coarse)').matches;

// Older mobile browsers (notably iOS Safari < 15.4) don't support the `dvh`
// unit and resize the visual viewport (not the layout viewport) when the
// on-screen keyboard opens, causing 100vh-based layouts to jump or get
// covered. We measure the real visible height ourselves and expose it as a
// CSS variable, refreshed on load, orientation change, and viewport resize.
function setAppViewportHeight() {
  const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.01;
  document.documentElement.style.setProperty('--app-vh', `${vh}px`);
}
setAppViewportHeight();
window.addEventListener('resize', setAppViewportHeight);
window.addEventListener('orientationchange', () => setTimeout(setAppViewportHeight, 100));

// Measure the fixed input dock's real rendered height (it varies with the
// file-badge showing/hiding, font sizes, safe-area insets, etc.) and expose
// it as a CSS variable so the hero can reserve exactly that much space —
// no more, no less — keeping content flush against the search bar with
// zero gap, on first paint and every time the dock's contents change.
const dockEl = document.getElementById('inputDock');
function updateDockHeight() {
  if (dockEl) document.documentElement.style.setProperty('--dock-h', `${dockEl.offsetHeight}px`);
}
updateDockHeight();
window.addEventListener('resize', updateDockHeight);
window.addEventListener('orientationchange', () => setTimeout(updateDockHeight, 100));
if (window.ResizeObserver && dockEl) new ResizeObserver(updateDockHeight).observe(dockEl);

// Toggle a body/hero class while the on-screen keyboard is visible so the
// layout can anchor to the top instead of re-centering, and the chat thread
// can shrink to leave room for the input row above the keyboard.
if (window.visualViewport) {
  let keyboardOpen = false;
  window.visualViewport.addEventListener('resize', () => {
    setAppViewportHeight();
    updateDockHeight();
    const heightDiff = window.innerHeight - window.visualViewport.height;
    const nowOpen = isCoarsePointer && heightDiff > 120; // heuristic: keyboard usually shrinks viewport by 120px+
    if (nowOpen !== keyboardOpen) {
      keyboardOpen = nowOpen;
      document.body.classList.toggle('keyboard-open', keyboardOpen);
      document.querySelector('.hero')?.classList.toggle('keyboard-open', keyboardOpen);
    }
    // Re-scroll the thread to the bottom on EVERY resize tick while the
    // keyboard is open — not just the first open/close transition. The
    // keyboard (and the dock above it) can keep nudging the visual
    // viewport slightly as it finishes animating in, or when it closes and
    // reopens for a second message, and each of those nudges can leave the
    // latest reply tucked behind the dock if we don't keep pinning to
    // bottom every time.
    if (nowOpen) {
      const thread = document.getElementById('chatThread');
      if (thread) requestAnimationFrame(() => { thread.scrollTop = thread.scrollHeight; });
    }
  });
}

// Belt-and-suspenders: also re-pin the chat thread to the bottom the moment
// the input regains focus on touch devices. Between messages the keyboard
// often dips and reopens (blur -> send -> focus again for the next reply),
// and that focus event is a reliable signal to make sure the newest
// message is still sitting right above the dock, even if a visualViewport
// resize tick was missed or coalesced by the browser.
if (isCoarsePointer) {
  document.getElementById('heroInput')?.addEventListener('focus', () => {
    const thread = document.getElementById('chatThread');
    if (thread) requestAnimationFrame(() => { thread.scrollTop = thread.scrollHeight; });
  });
}

let recognition = null;
let isListening = false;
let voiceCheckpointText = '';    // box contents as of session start or last manual edit
let voiceCheckpointFinalLen = 0; // how much of the recomputed final transcript was already folded into voiceCheckpointText
let voiceLastFinalText = '';     // most recent full final transcript (recomputed fresh each event)
let voiceOutputEnabled = false;

function getSpeechRecognitionCtor() {
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

function initSpeechRecognition() {
  const SR = getSpeechRecognitionCtor();
  if (!SR) return null;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = (navigator.language || 'en-US');

  r.onresult = (event) => {
    const input = document.getElementById('heroInput');
    // Recompute the ENTIRE final transcript from index 0 every time,
    // rather than trusting event.resultIndex to mark only what's new.
    // Some mobile browsers (notably Android Chrome in continuous mode)
    // occasionally redeliver a result that was already marked final in
    // an earlier event with a resultIndex that doesn't skip past it;
    // appending incrementally in that case adds the same words twice.
    // Recomputing fresh each time makes that impossible.
    let finalText = '';
    let interimText = '';
    for (let i = 0; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalText += transcript + ' ';
      else interimText += transcript;
    }
    voiceLastFinalText = finalText;
    // Only the portion of the final transcript beyond the last checkpoint
    // (session start, or the person's last manual edit) is new — this
    // keeps a mid-dictation manual edit intact instead of being
    // overwritten by the recomputed transcript.
    const newFinal = finalText.slice(voiceCheckpointFinalLen);
    // Text lands in the (still fully editable) search box — nothing is
    // ever auto-sent; the person reviews/edits, then taps send themselves.
    input.value = (voiceCheckpointText + newFinal + interimText).replace(/\s+/g, ' ').trimStart();
  };

  r.onerror = () => stopListening();
  r.onend = () => stopListening();

  return r;
}

function stopListening() {
  isListening = false;
  const micBtn = document.getElementById('micBtn');
  const searchBar = document.getElementById('searchBar');
  micBtn.classList.remove('listening');
  searchBar.classList.remove('searching');
  triggerNebula(false);
}

function toggleVoiceInput(e) {
  if (e) e.stopPropagation();
  const micBtn = document.getElementById('micBtn');
  const input = document.getElementById('heroInput');

  if (!getSpeechRecognitionCtor()) {
    micBtn.setAttribute('data-tip', 'Not supported here');
    return;
  }
  if (!recognition) recognition = initSpeechRecognition();
  if (!recognition) return;

  if (isListening) {
    recognition.stop();
    stopListening();
    input.focus();
    return;
  }

  primeInput();
  voiceCheckpointText = input.value ? input.value.trim() + ' ' : '';
  voiceCheckpointFinalLen = 0;
  voiceLastFinalText = '';
  try {
    recognition.start();
    isListening = true;
    micBtn.classList.add('listening');
    document.getElementById('searchBar').classList.add('searching');
    document.getElementById('nebula').classList.add('active');
  } catch (err) {
    // start() throws if already started — ignore, it's already listening.
  }
}

// If the person starts typing by hand while dictating, keep the manual
// edit as the new checkpoint so incoming speech results append after it
// instead of overwriting it.
document.getElementById('heroInput').addEventListener('input', () => {
  if (isListening) {
    voiceCheckpointText = document.getElementById('heroInput').value;
    voiceCheckpointFinalLen = voiceLastFinalText.length;
  }
});

function speakText(text) {
  if (!('speechSynthesis' in window) || !text) return;
  const clean = text.replace(/<[^>]+>/g, '').trim();
  if (!clean) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(clean);
  utter.rate = 1;
  utter.pitch = 1;
  utter.lang = (navigator.language || 'en-US');
  window.speechSynthesis.speak(utter);
}

function toggleVoiceOutput(e) {
  if (e) e.stopPropagation();
  voiceOutputEnabled = !voiceOutputEnabled;
  const btn = document.getElementById('voiceToggleBtn');
  btn.classList.toggle('enabled', voiceOutputEnabled);
  btn.setAttribute('data-tip', voiceOutputEnabled ? 'Voice replies on' : 'Voice replies off');
  if (!voiceOutputEnabled && 'speechSynthesis' in window) window.speechSynthesis.cancel();
}

function replaySpeech(btn) {
  const body = btn.closest('.chat-assistant-body');
  if (!body) return;
  const textEl = body.querySelector('.ai-response-text');
  if (!textEl) return;
  const raw = textEl.dataset.rawText || textEl.textContent;

  if (!('speechSynthesis' in window)) return;

  if (btn.classList.contains('speaking')) {
    window.speechSynthesis.cancel();
    btn.classList.remove('speaking');
    return;
  }
  document.querySelectorAll('.speak-btn.speaking').forEach(b => b.classList.remove('speaking'));
  window.speechSynthesis.cancel();

  const clean = raw.replace(/<[^>]+>/g, '').trim();
  if (!clean) return;
  const utter = new SpeechSynthesisUtterance(clean);
  utter.rate = 1;
  utter.pitch = 1;
  utter.lang = (navigator.language || 'en-US');
  utter.onend = () => btn.classList.remove('speaking');
  utter.onerror = () => btn.classList.remove('speaking');
  btn.classList.add('speaking');
  window.speechSynthesis.speak(utter);
}

function formatAIReply(text) {

    .replace(/([A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,})/gi,'<a href="mailto:$1">$1</a>')
    .replace(/(\+?\d[\d\s()-]{7,}\d)/g,'<a href="tel:$1">$1</a>')
    .replace(/\n/g,"<br>");
}

  let targetReply = null;

  for (const item of LOCAL_RESPONSES) {
    if (item.keywords.some(k => lowerQuery.includes(k))) {
      targetReply = item.reply;
      break;
    }
  }

  // If no local match, call Groq worker
  if (!targetReply) {
    responseLabel.textContent = "ManO is thinking...";
    try {
      const response = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: query, history: conversationHistory }),
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      targetReply = data.reply || "Hmm, I couldn't find an answer. Try asking about our services or pricing!";

      // Save to history
      conversationHistory.push({ role: "user", content: query });
      conversationHistory.push({ role: "assistant", content: targetReply });
      if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);

    } catch (err) {
      console.error("Worker error:", err);
      targetReply = "Oops, I am Not working! Try again later or Ask ChatGPT or Gemini.";
    }
  }

  responseLabel.textContent = "ManO AI";

  aiText.classList.remove('typing');
  let i = 0;
  aiText.classList.add('typing');
  const thread = document.getElementById('chatThread');

  const typeInterval = setInterval(() => {
    aiText.textContent = targetReply.slice(0, i);
    i += 3;
    thread.scrollTop = thread.scrollHeight;
    if (i > targetReply.length) {
      aiText.innerHTML = formatAIReply(targetReply);
      aiText.dataset.rawText = targetReply;
      aiText.classList.remove('typing');
      clearInterval(typeInterval);
      isLoading = false;
      triggerNebula(false);
      sendBtn.classList.remove('loading');
      sendIcon.innerHTML = '<path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>';
      thread.scrollTop = thread.scrollHeight;
      input.placeholder = getRandomPlaceholder();
      // Don't reopen the keyboard automatically if the person sent this
      // via the send icon — respect that they closed it, and let them tap
      // the search bar again when they're ready to type the next message.
      if (!sentViaSendButton) input.focus();
      if (voiceOutputEnabled) speakText(targetReply);
    }
  }, 12);

  if (hadFile) removeFile(null);
}

document.getElementById('heroInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing) {
    e.preventDefault();
    sendQuery(e);
  }
});

document.addEventListener('keydown', (e) => {
  // Skip on touch/coarse-pointer devices: there's no physical keyboard to
  // "start typing" on, and grabbing focus here can fight with the on-screen
  // keyboard's own show/hide animation.
  if (isCoarsePointer) return;
  const heroInput = document.getElementById('heroInput');
  if (!heroInput || document.activeElement === heroInput) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const isPrintable = e.key.length === 1;
  const isEditKey = e.key === 'Backspace';
  if (isPrintable || isEditKey) {
    if (isIntroActive) primeInput();
    heroInput.focus();
  }
});

// Decode a Google Identity Services JWT credential (client-side only,
// just for reading the profile fields — no signature verification needed
// since this is purely for display, not for authenticating a backend).
function decodeJwtPayload(token) {
  try {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(
      atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
    );
    return JSON.parse(jsonPayload);
  } catch (e) {
    return null;
  }
}

function initGoogleSignIn(retries) {
  if (retries === undefined) retries = 20;
  if (window.google && google.accounts && google.accounts.id) {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleSignIn,
      auto_select: true,
      cancel_on_tap_outside: false
    });
    google.accounts.id.renderButton(
      document.getElementById('googleSignInBtn'),
      { theme: 'filled_black', size: 'large', shape: 'pill', width: 280, text: 'signin_with' }
    );
    google.accounts.id.prompt(); // offers One Tap for returning users
  } else if (retries > 0) {
    setTimeout(() => initGoogleSignIn(retries - 1), 150);
  } else {
    const fallback = document.getElementById('googleSignInFallback');
    if (fallback) fallback.style.display = 'block';
  }
}

function handleGoogleSignIn(response) {
  const payload = decodeJwtPayload(response.credential);
  if (!payload) return;

  userEmail = payload.email || '';
  userPicture = payload.picture || '';
  const rawName = (payload.given_name || payload.name || '').trim();
  userName = rawName ? rawName.charAt(0).toUpperCase() + rawName.slice(1) : 'Friend';
  nameCollected = true;

  // Hide overlay with fade
  const overlay = document.getElementById('nameOverlay');
  overlay.style.transition = 'opacity .4s ease';
  overlay.style.opacity = '0';
  setTimeout(() => { overlay.style.display = 'none'; }, 400);

  updateWelcomeText();

  // Flash the search bar and focus it
  const searchBar = document.getElementById('searchBar');
  searchBar.classList.add('flash-border');
  setTimeout(() => searchBar.classList.remove('flash-border'), 3100);

  const heroInput = document.getElementById('heroInput');
  heroInput.placeholder = getRandomPlaceholder();
  heroInput.focus();

  // Show a greeting in chat
  const panel = document.getElementById('aiPanel');
  const branding = document.getElementById('chatBranding');
  panel.classList.add('visible');
  branding.classList.add('visible');

  const thread = document.getElementById('chatThread');
  const turn = document.createElement('div');
  turn.className = 'chat-turn';
  turn.innerHTML = `
    <div class="chat-assistant-row">
      <div class="chat-avatar">
        <img src="https://i.ibb.co/BHgkQN72/unnamed.png" alt="Mano logo" referrerpolicy="no-referrer" onerror="this.style.display='none'">
      </div>
      <div class="chat-assistant-body">
        <div class="ai-response-label-row">
          <div class="ai-response-label">ManO AI</div>
          <button class="speak-btn" onclick="replaySpeech(this)" aria-label="Read reply aloud" title="Read aloud">
            <svg viewBox="0 0 24 24">
              <path d="M11 5L6 9H2v6h4l5 4V5z"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
        </div>
        <div class="ai-response-text typing" id="greetText"></div>
      </div>
    </div>
  `;
  thread.appendChild(turn);

  const greetEl = document.getElementById('greetText');
  const greeting = `Hey ${userName}! 👋 I'm ManO, an AI from ManO CreationS. Ask me anything about our design services!`;
  let gi = 0;
  const greetInterval = setInterval(() => {
    greetEl.textContent = greeting.slice(0, gi);
    gi += 3;
    thread.scrollTop = thread.scrollHeight;
    if (gi > greeting.length) {
      greetEl.textContent = greeting;
      greetEl.dataset.rawText = greeting;
      greetEl.classList.remove('typing');
      clearInterval(greetInterval);
      if (voiceOutputEnabled) speakText(greeting);
    }
  }, 12);
}

document.addEventListener('DOMContentLoaded', () => {
  updateWelcomeText();
  window.scrollTo({ top: 0, behavior: 'instant' });
  initGoogleSignIn();
});
</script>
